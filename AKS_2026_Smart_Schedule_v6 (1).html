<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AKS 2026 Smart Schedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;font-size:12px;color:#1a1a1a;background:#f8f7f4;padding:16px}
.top{padding:0 0 14px;margin-bottom:14px;border-bottom:1px solid #ddd}
.title{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:2px;font-family:Georgia,serif}
.sub{font-size:11px;color:#666;line-height:1.6}
.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.mc{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:8px 10px}
.mc-l{font-size:10px;color:#666;margin-bottom:2px}
.mc-v{font-size:18px;font-weight:700}
.controls{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.btn{background:#fff;border:1px solid #ccc;border-radius:4px;padding:4px 11px;font-size:11px;cursor:pointer;color:#444;font-family:inherit;white-space:nowrap}
.btn.a{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.btn.sp{border-color:#0c4479;color:#0c4479}
.btn.sp.a{background:#0c4479;color:#fff}
.btn.ck{border-color:#A32D2D;color:#A32D2D}
.btn.ck.a{background:#A32D2D;color:#fff}
.sep{width:1px;height:16px;background:#ddd;margin:0 3px;flex-shrink:0}
.cal-wrap{overflow-x:auto;background:#f5f3f0;padding:10px;border-radius:8px}
.month-block{margin-bottom:20px}
.month-hdr{font-size:11px;font-weight:600;letter-spacing:.12em;color:#a09488;text-transform:uppercase;margin-bottom:6px;font-family:Georgia,serif}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.dow-cell{font-size:9px;text-align:center;color:#c0b8b0;font-weight:600;padding:2px 0}
.day-cell{border-radius:4px;padding:5px 6px;cursor:pointer;min-height:82px;border:1px solid #e8e4de;background:#faf9f7;transition:all .1s}
.day-cell:hover{border-color:#a09890;transform:translateY(-1px);background:#f5f3f0}
.day-cell.empty{background:transparent;border-color:transparent;cursor:default;transform:none!important}
.day-cell.WATCH{border-left:3px solid #c08c3a;background:#fdf8f0}
.day-cell.HARD{border-left:3px solid #A32D2D;background:#fdf5f5}
.day-cell.selected{outline:2px solid #4a7fa5;outline-offset:1px;background:#f0f5fa}
.dn{font-size:11px;font-weight:700;color:#9a9490}
.day-cell.HARD .dn{color:#b84040}
.day-cell.WATCH .dn{color:#9a6520}
.flags{display:flex;gap:2px;flex-wrap:wrap;margin-top:3px}
.fl{font-size:8px;padding:1px 4px;border-radius:2px;font-weight:700;line-height:1.4}
.fl-P{background:#dff0e8;color:#0a5c3a}
.fl-PH{background:#fee;color:#8b0000;border:1px solid #f5c0c0}
.fl-E{background:#dbeeff;color:#0c4479}
.fl-M{background:#fef0d8;color:#7a4a00}
.fl-ECH{background:#fee;color:#8b0000}
.fl-ECW{background:#fff8ee;color:#854F0B}
.pilots-mini{margin-top:3px;font-size:9px;color:#777;line-height:1.4;overflow:hidden;max-height:32px}
.detail{border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:16px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.det-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #eee;flex-wrap:wrap}
.det-date{font-size:20px;font-weight:700;font-family:Georgia,serif}
.det-dow{font-size:13px;color:#888}
.sev-chip{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:700}
.sev-OK{background:#dff0e8;color:#0a5c3a}
.sev-WATCH{background:#fef0d8;color:#7a4a00}
.sev-HARD{background:#fee;color:#8b0000}
.det-flags{display:flex;gap:6px;flex-wrap:wrap}
.tail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px;margin-bottom:10px}
.tail-card{border:1px solid #e0e0e0;border-radius:6px;padding:10px 12px;background:#fafafa}
.tail-card.AM{border-top:3px solid #0d6e56}
.tail-card.PC{border-top:3px solid #185FA5}
.tail-card.SV{border-top:3px solid #7a4500}
.tail-card.EX{border-top:3px solid #2d6010}
.tail-card.BV{border-top:3px solid #9a5e00}
.tail-card.C2{border-top:3px solid #4a3aa0}
.tail-card.sp-clean{box-shadow:0 0 0 2px #0c4479}
.tail-card.sp-watch{box-shadow:0 0 0 2px #e8a030}
.tail-card.sp-hard{box-shadow:0 0 0 2px #A32D2D}
.tc-tail{font-size:11px;font-weight:700;letter-spacing:.06em;color:#444}
.tc-type{font-size:9px;color:#999;margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em}
.tc-pilot{font-size:14px;font-weight:700;cursor:pointer;display:inline-block;padding:2px 6px;border-radius:3px;border:1px solid transparent;transition:all .1s}
.tc-pilot:hover{background:#f0f0f0;border-color:#ccc}
.tc-pilot.active{background:#1a1a1a;color:#fff}
.tc-pilot.no-pilot{color:#A32D2D;cursor:default}
.tc-sr{font-size:10px;color:#0a5c3a;background:#f0faf4;border-radius:4px;padding:5px 7px;margin-bottom:5px}
.tc-sr-pilot{font-size:12px;font-weight:700;color:#0a5c3a;cursor:pointer;padding:2px 6px;border-radius:3px;border:1px solid transparent;display:inline-block}
.tc-sr-pilot:hover{background:#dff0e8;border-color:#b8e0ce}
.tc-sr-pilot.active{background:#0a5c3a;color:#fff}
.no-pybus-note{font-size:10px;margin-top:4px;background:#fff8f8;border:1px solid #f5c0c0;border-radius:3px;padding:3px 6px;color:#8b0000}
.sp-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:3px;margin-top:5px;font-weight:700}
.sp-c{background:#dbeeff;color:#0c4479;border:1px solid #b0d4f5}
.sp-w{background:#fff8ee;color:#854F0B;border:1px solid #f5d090}
.sp-h{background:#fee;color:#8b0000;border:1px solid #f5c0c0}
.duty-bar{margin-top:7px;padding-top:7px;border-top:1px solid #eee}
.duty-row{display:flex;justify-content:space-between;margin-bottom:3px}
.duty-label{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.duty-val{font-size:11px;font-weight:700;font-family:'Courier New',monospace}
.ok{color:#333} .warn{color:#854F0B} .over{color:#A32D2D}
.legs-panel{margin-top:10px;border:1px solid #ddd;border-radius:6px;background:#fff;overflow-x:auto;overflow-y:visible}
.legs-hdr{color:#fff;padding:8px 14px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:10px}
.legs-hdr .x{margin-left:auto;cursor:pointer;opacity:.6;font-size:14px}
.legs-hdr .x:hover{opacity:1}
.legs-summary{background:#f4f4f2;padding:7px 14px;display:flex;gap:14px;flex-wrap:wrap;border-bottom:1px solid #e0e0e0}
.lsum{font-size:10px;color:#666}
.lsum strong{font-size:11px}
.leg-table{width:100%;border-collapse:collapse}
.leg-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#888;padding:4px 5px;text-align:left;border-bottom:1px solid #e8e8e8;background:#fafafa}
.leg-table td{font-size:11px;padding:4px 5px;border-bottom:1px solid #f5f5f5;white-space:nowrap}
.leg-table tr:last-child td{border-bottom:none}
.leg-table tr:hover td{background:#fafafa}
.leg-table tr.sr td{background:#f5fcf8}
.leg-table tr.est td{background:#f0f6ff}
.leg-dep{font-weight:700;font-family:'Courier New',monospace}
.leg-arr{color:#888;font-family:'Courier New',monospace}
.leg-dur{font-size:10px;color:#aaa}
.ld-PYB,.ld-PyC{color:#0a5c3a;background:#f0faf4;padding:1px 4px;border-radius:2px}
.ld-ELF{color:#0c4479;background:#dbeeff;padding:1px 4px;border-radius:2px}
.ld-NRL,.ld-PCK{color:#7a4a00;background:#fef0d8;padding:1px 4px;border-radius:2px}
.ptag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700;white-space:nowrap}
.ptag.sr{background:#dff0e8;color:#0a5c3a}
.ptag.ln{background:#e8eef8;color:#0c3a7a}
.ptag.est{background:#dbeeff;color:#0c4479;border:1px dashed #0c4479}
.est-note{font-size:9px;font-style:italic;color:#0c4479;padding:5px 8px;background:#f0f6ff;border-top:1px solid #dbeeff}
.ops-strip{background:#f8f7f4;border-radius:6px;padding:10px 14px;font-size:11px;margin-top:10px;display:flex;gap:16px;flex-wrap:wrap;border:1px solid #eee}
.ops-label{font-size:10px;color:#999;font-weight:700;min-width:55px;text-transform:uppercase;letter-spacing:.06em}
.alert{border-radius:6px;padding:10px 14px;font-size:11px;margin-bottom:8px;line-height:1.7;border-left:3px solid}
.alert.red{background:#fff8f8;border-color:#A32D2D;color:#5a0000}
.alert.amber{background:#fffbf5;border-color:#e8a030;color:#5a3000}
.alert.green{background:#f0faf4;border-color:#0a5c3a;color:#0a5c3a}
.alert.blue{background:#f0f6ff;border-color:#0c4479;color:#0c4479}
.list-row{display:grid;grid-template-columns:100px 36px 70px 1fr 150px;gap:8px;padding:6px 8px;border-bottom:1px solid #eee;align-items:center;cursor:pointer;font-size:11px}
.list-row:hover{background:#fafafa}
.list-hdr{display:grid;grid-template-columns:100px 36px 70px 1fr 150px;gap:8px;padding:4px 8px 6px;border-bottom:1px solid #ccc;font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.08em}

.rest-warn{font-size:10px;margin-top:4px;padding:3px 6px;border-radius:3px}


#gtip{display:none;position:fixed;z-index:99999;background:#fff;color:#1a1a1a;
  border-radius:7px;padding:11px 14px;font-size:13px;font-family:'Courier New',monospace;
  line-height:2.0;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15);
  pointer-events:none;border:1px solid #ddd}
.gtr{display:grid;grid-template-columns:70px 1fr;gap:10px;align-items:center}
.gtr-tail{color:#0c4479;font-size:11px;font-weight:700;letter-spacing:.04em}
.gtr-pilot{font-weight:700}

/* badge cursor */
.fl[data-tip]{cursor:help}
.fl[data-tip]:hover::before{
  content:'';
  position:absolute;
  bottom:calc(100% + 1px);
  left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:#1a1a1a;
  z-index:99999;
  pointer-events:none;
}

.fl[data-tip]:hover ~ #gtip,
.flags:hover #gtip { display:none !important }

.flags{overflow:visible}

#btip{
  display:none;
  position:fixed;
  z-index:999999;
  background:#1a1a1a;
  color:#f0f0f0;
  font-size:12px;
  font-family:system-ui,sans-serif;
  font-weight:400;
  line-height:1.5;
  padding:8px 12px;
  border-radius:6px;
  max-width:240px;
  white-space:normal;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
  pointer-events:none;
}
.fl[data-tip]{cursor:help}
</style>
</head>

function fmt(m) {
  return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0');
}
function pt(t) {
  const m = t && t.match(/(\d+):(\d+)/);
  return m ? +m[1]*60 + +m[2] : null;
}
function hm(m) {
  if (m === null || m === undefined) return '--';
  return Math.floor(Math.abs(m)/60) + 'h' + String(Math.abs(m)%60).padStart(2,'0') + 'm';
}
function dcol(m) {
  return m >= 840 ? 'over' : m >= 720 ? 'warn' : 'ok';
}
function ini(n) {
  if (!n || n === '???') return '??';
  const p = n.split(' ');
  if (p.length === 1) return n.slice(0,2).toUpperCase();
  if (p[0].length <= 2 && p[0].endsWith('.')) return (p[0][0] + (p[1]?p[1][0]:'')).toUpperCase();
  return (p[0][0] + (p[1]?p[1][0]:'')).toUpperCase();
}

// -- DUTY CALC ---------------------------------------------------------------
function calcDuty(legs, srHO) {
  if (!legs || !legs.length) return null;
  const first = legs[0][0];
  const last = Math.max(...legs.map(l => l[1] || l[0]+30));
  const dutyS = first - 60, dutyE = last + 30, dutyM = dutyE - dutyS;
  let srB=0, lnB=0, srDS=null, srDE=null, srDM=0, lnDS=null, lnDE=null, lnDM=0;
  if (srHO) {
    const sl = legs.filter(l => l[0] < srHO);
    const ll = legs.filter(l => l[0] >= srHO);
    sl.forEach(l => { srB += l[1] ? l[1]-l[0] : 30; });
    ll.forEach(l => { lnB += l[1] ? l[1]-l[0] : 30; });
    if (sl.length) { srDS = sl[0][0]-60; srDE = (sl[sl.length-1][1]||sl[sl.length-1][0]+30)+30; srDM = srDE-srDS; }
    if (ll.length) { lnDS = ll[0][0]-60; lnDE = (ll[ll.length-1][1]||ll[ll.length-1][0]+30)+30; lnDM = lnDE-lnDS; }
  } else {
    lnB = legs.reduce((s,l) => s + (l[1] ? l[1]-l[0] : 30), 0);
    lnDS = dutyS; lnDE = dutyE; lnDM = dutyM;
  }
  const realB = legs.filter(l=>l[4]!=='EST').reduce((s,l)=>s+(l[1]?l[1]-l[0]:30),0);
  return { dutyS, dutyE, dutyM, srB, lnB, srDS, srDE, srDM, lnDS, lnDE, lnDM, realB };
}

// -- PERKINS CHECK -----------------------------------------------------------
function perkinsCheck(ds, assignments) {
  if (!PYBUS.has(ds)) return null;
  const pa = assignments.find(a => a.ty==='AM' && a.pilot==='Perkins');
  if (!pa) return null;
  const amphibA = assignments.filter(a => a.ty==='AM');
  const covered = amphibA.filter(a => a.sr);
  const srNames = [...new Set(amphibA.map(a=>a.sr).filter(Boolean))];
  if (covered.length >= 2) return { level:'OK', msg:`${srNames.join(' + ')} cover both amphib Pybus legs. Perkins takes over after 09:30.` };
  if (covered.length === 1) {
    const unc = amphibA.find(a => !a.sr && a.pilot==='Perkins');
    return { level:'HARD', msg:`Perkins on ${unc?.t||'amphib'} cannot fly Pybus legs. Only ${srNames[0]} available -- move Perkins to Beaver/C-206 or bring in a second senior.` };
  }
  return { level:'HARD', msg:`Perkins on ${pa.t} cannot fly Pybus legs. NO SENIOR available -- reassign Perkins to Beaver/C-206 or call in a senior.` };
}

// -- BUILD DAY ---------------------------------------------------------------
function buildDay(ds) {
  const date = new Date(ds + 'T12:00:00');
  const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()];
  const isPybus  = PYBUS.has(ds);
  const isSpDay  = !!SP_DAYS[ds];
  const isMorning = isSpDay && !!TUE_AM[ds];
  const spConf   = SP_DAYS[ds]?.conf || null;
  const elfinConf = ELFIN_CONF[ds] || null;
  const spTail   = isSpDay ? (LEGS[ds+'|N265KP']?.length ? 'N265KP' : 'N264KP') : null;

  let assignments = [];

  if (MAY_ASSIGN[ds]) {
    // May: use actual schedule from spreadsheet
    assignments = MAY_ASSIGN[ds].map(a => ({
      ...a,
      isSpTail: a.t === spTail && isSpDay,
      srCovers: a.srHO === '07:30' ? '05:45 first 2 legs' :
                a.srHO === '08:00' ? '07:10 JNU-GST, hands off 08:00' : null
    }));
  } else {
    // Jun-Sep: day-of-week schedule from actual May spreadsheet
    const allPilots = Object.keys(WORK_DAYS);
    const working   = allPilots.filter(p => isWorking(p, date));

    const used = new Set();
    const srCovered = {};

    for (const {t, ty} of TAILS) {
      const tailHasLegs = !!(LEGS[ds + '|' + t] && LEGS[ds + '|' + t].length);

      // P1: pilots whose cycle role == this tail type (A2 tails use C2 pilots)
      const matchTy = ty==='A2' ? 'C2' : ty;
      const p1 = working.filter(p => PRIMARY_ROLE[p]===matchTy && !used.has(p) && !SENIORS.has(p));
      // P2: pilots on duty today, qualified for this type, non-senior (cross-qual swap)
      const p2 = working.filter(p => !used.has(p) && !SENIORS.has(p)
                   && ((QUALS[p]||[]).includes(ty)||(ty==='A2'&&(QUALS[p]||[]).includes('C2'))) && PRIMARY_ROLE[p]!==matchTy);
      // P3: senior pilots on duty today, qualified (absolute last resort, Kveum last)
      const p3 = SR_ORDER.filter(p => working.includes(p) && !used.has(p)
                   && ((QUALS[p]||[]).includes(ty)||(ty==='A2'&&(QUALS[p]||[]).includes('C2'))));

      let pilot = [...p1, ...p2, ...p3, '???'][0];

      let sr=null, srCovers=null, srHO=null, lineStart=null;

      if (ty === 'AM' && !srCovered['AM'] && tailHasLegs) {
        for (const [cand,ho,ls] of [['Corson','07:30','07:00 show'],['Ford','07:30','07:00 show'],['Kveum','07:30','07:00 show']]) {
          if (working.includes(cand) && !used.has(cand)) {
            sr=cand; srHO=ho; srCovers='05:45 first 2 legs'; lineStart=ls; srCovered['AM']=true; break;
          }
        }
      }

      if (ty === 'PC' && !srCovered['PC'] && tailHasLegs) {
        const lineAvail = p1.length > 0;
        const otherPC = TAILS.filter(({t:t2,ty:ty2}) => ty2==='PC' && t2!==t);
        const swapAvail = lineAvail || otherPC.some(({t:t2}) => {
          const tl = (LEGS[ds+'|'+t2]||[]).filter(l=>l.length<5||l[4]!=='EST');
          return !tl.length || Math.min(...tl.map(l=>l[0])) >= 510;
        });
        if (!swapAvail) {
          for (const [cand,ho,ls] of [['Hake','08:00','08:15 show'],['Ford','08:00','08:15 show'],['Kveum','08:00','08:15 show']]) {
            if (working.includes(cand) && !used.has(cand) && (QUALS[cand]||[]).includes('PC')) {
              sr=cand; srHO=ho; srCovers='07:10 JNU-GST, hands off 08:00'; lineStart=ls; srCovered['PC']=true; break;
            }
          }
        }
      }

      const isSpTail = (t === spTail && isSpDay);
      if (pilot && pilot !== '???') used.add(pilot);
      assignments.push({ t, ty, pilot: pilot||'???', sr, srCovers, srHO, lineStart, isSpTail });
    }
  }

  const pc = perkinsCheck(ds, assignments);
  const isHard  = isPybus && isMorning && isSpDay;
  const isWatch = isPybus && isSpDay && !isMorning;
  const dayViols = VIOLS[ds] || [];
  const hasRestViol = dayViols.some(v => v.type==='REST');
  const has8in24    = dayViols.some(v => v.type==='8IN24');
  const hasDutyOver = dayViols.some(v => v.type==='DUTY');
  const hasPerkHard = pc?.level === 'HARD';

  const daySugg = SUGG[ds] || [];
  const hasSuggHigh  = daySugg.some(s => s.priority <= 2);
  const dayOverlaps  = OVERLAPS[ds] || [];
  const hasOverlap   = dayOverlaps.length > 0;

  // Check ELV/PBK qualification violations for this day
  const qualViols = [];
  for (const a of assignments) {
    const tailLegs = LEGS[ds+'|'+a.t] || [];
    const isFloat = FLOAT_TAILS.has(a.t);
    for (const leg of tailLegs) {
      const dest = leg[3];
      // ELV-specific qual check
      if (dest==='ELF' && !ELV_QUAL.has(a.pilot)) {
        qualViols.push({tail:a.t, pilot:a.pilot, dest:'ELF', dep:leg[0], arr:leg[1], orig:leg[2], note:'Not ELV cleared'});
      }
      // PBK-specific qual check
      if (dest==='PCK' && !PBK_QUAL.has(a.pilot)) {
        qualViols.push({tail:a.t, pilot:a.pilot, dest:'PCK', dep:leg[0], arr:leg[1], orig:leg[2], note:'Not PBK cleared'});
      }
      // Float-only destination on a wheel aircraft
      if (DEST_TYPE[dest]==='FLOAT' && !isFloat && dest!=='ELF' && dest!=='PCK') {
        qualViols.push({tail:a.t, pilot:a.pilot, dest, dep:leg[0], arr:leg[1], orig:leg[2], note:'Float-only destination on wheel aircraft'});
      }
    }
  }
  const hasQualViol = qualViols.length > 0;

  let sev = 'OK';
  if (isHard || hasPerkHard || hasOverlap) sev = 'HARD';
  else if (isWatch || hasRestViol || hasDutyOver || hasQualViol) sev = 'WATCH';

  return { ds, dow, sev, isPybus, isSpDay, isMorning, elfinConf, spConf, spTail,
           assignments, pc, isHard, isWatch, dayViols, hasRestViol, has8in24, hasDutyOver,
           daySugg, hasSuggHigh, dayOverlaps, hasOverlap, qualViols, hasQualViol };
}

// Filter counts - computed from ALL after buildDay runs
function getFilterCount(f) {
  if (f === 'ALL')     return ALL.length;
  if (f === 'HARD')    return ALL.filter(d => d.sev==='HARD').length;
  if (f === 'WATCH')   return ALL.filter(d => d.sev==='WATCH').length;
  if (f === 'PYBUS')   return ALL.filter(d => d.isPybus).length;
  if (f === 'SP')      return ALL.filter(d => d.isSpDay).length;
  if (f === 'SP_HARD') return ALL.filter(d => d.elfinConf?.type==='HARD').length;
  if (f === 'SP_WATCH')return ALL.filter(d => d.elfinConf && d.elfinConf.type!=='HARD').length;
  if (f === 'PERKINS') return ALL.filter(d => d.isPybus && d.pc?.level==='HARD').length;
  if (f === 'OVERLAP') return ALL.filter(d => d.hasOverlap).length;
  if (f === 'QUAL')    return ALL.filter(d => d.hasQualViol).length;
  if (f === 'REST')    return ALL.filter(d => d.hasRestViol||d.has8in24).length;
  if (f === 'DUTY')    return ALL.filter(d => d.hasDutyOver).length;
  return 0;
}

function updateFilterCounts() {
  document.querySelectorAll('.btn[data-filt]').forEach(btn => {
    const f = btn.getAttribute('data-filt');
    const n = getFilterCount(f);
    const base = btn.getAttribute('data-label');
    btn.textContent = n > 0 ? base + ' (' + n + ')' : base;
    if (btn.classList.contains('a')) btn.textContent = base + ' (' + n + ')';
  });
}
function filt(f) {
  activeFilter = f;
  document.querySelectorAll('.btn[data-filt]').forEach(b => {
    b.classList.toggle('a', b.getAttribute('data-filt') === f);
  });
  updateFilterCounts();
  renderAll();
}

  activeView = v;
  document.querySelectorAll('.btn').forEach(b => {
    if (b.textContent==='Calendar' || b.textContent==='List')
      b.classList.toggle('a', b.textContent === (v==='CAL' ? 'Calendar' : 'List'));
  });
  renderAll();
}

    if (activeFilter==='HARD')     return d.sev==='HARD';
    if (activeFilter==='WATCH')    return d.sev==='WATCH';
    if (activeFilter==='PYBUS')    return d.isPybus;
    if (activeFilter==='SP')       return d.isSpDay;
    if (activeFilter==='SP_HARD')  return d.elfinConf?.type==='HARD';
    if (activeFilter==='SP_WATCH') return d.elfinConf && d.elfinConf.type!=='HARD';
    if (activeFilter==='PERKINS')  return d.isPybus && d.pc?.level==='HARD';
    if (activeFilter==='OVERLAP')  return d.hasOverlap;
    if (activeFilter==='QUAL')     return d.hasQualViol;
    if (activeFilter==='REST')     return d.hasRestViol || d.has8in24;
    if (activeFilter==='DUTY')     return d.hasDutyOver;
    return true;
  });
}

// -- LEGS PANEL --------------------------------------------------------------
function buildLegsPanel(ds, tail, srName, lineName, isSrClick, srHO) {
  const key  = ds + '|' + tail;
  const base = LEGS[key] || [];
  const d    = ALL.find(x => x.ds===ds);
  const isSpTail = tail === d?.spTail && d?.isSpDay;
  const spLegs   = isSpTail ? (d.isMorning ? SP_AM_LEGS : SP_PM_LEGS) : [];
  const allLegs  = [...base, ...spLegs].sort((a,b) => a[0]-b[0]);
  const srHOm    = srHO ? pt(srHO) : null;
  const myLegs   = (isSrClick && srHOm) ? allLegs.filter(l=>l[0]<srHOm)
                 : srHOm                 ? allLegs.filter(l=>l[0]>=srHOm)
                 :                         allLegs;

  if (!myLegs.length) {
    const whyMsg = isSrClick
      ? `${srName} covers the early leg on ${tail} but this tail has no scheduled legs in the flight log for this date. Senior coverage is based on the 4-on/3-off schedule pattern.`
      : `No scheduled legs on file for ${tail} on this date.`;
    return `<div class="legs-panel" id="lp_${tail.replace(/\W/g,"")}_${ds}" onclick="event.stopPropagation()"><div class="legs-hdr" style="background:#1a1a1a">${fullName(isSrClick?srName:lineName)} - ${tail}<span class="lx" onclick="closeLegs(event)">x</span></div><div style="padding:14px;font-size:12px;color:#666;line-height:1.8;max-width:420px">${whyMsg}</div></div>`;
  }

  const duty = calcDuty(myLegs, null);
  const dc   = duty ? dcol(duty.lnDM) : 'ok';
  const pct  = duty ? Math.min(100, Math.round(duty.lnDM/840*100)) : 0;
  const hasEst = spLegs.length > 0 && !isSrClick;

  // Check rest chain from tail summary
  const ts = (TSUMM[tail] || {})[ds] || null;
  let restHtml = '';
  if (ts && ts.rp !== undefined && ts.rp < 600) {
    const rc = ts.rp < 540 ? '#A32D2D' : '#e8a030';
    restHtml += `<div style="font-size:10px;padding:4px 14px;background:${ts.rp<540?'#fee':'#fffbf5'};color:${rc};border-bottom:1px solid #eee">Rest from previous day (${ts.pd}): ${hm(ts.rp)} -- minimum is 10h00m</div>`;
  }
  if (ts && ts.rn !== undefined && ts.rn < 600) {
    const rc = ts.rn < 540 ? '#A32D2D' : '#e8a030';
    restHtml += `<div style="font-size:10px;padding:4px 14px;background:${ts.rn<540?'#fee':'#fffbf5'};color:${rc};border-bottom:1px solid #eee">Rest to next day (${ts.nds}) show ${fmt(ts.nds_start)}: ${hm(ts.rn)} -- minimum is 10h00m</div>`;
  }

  const summary = duty ? `<div class="legs-summary">
    <div class="lsum">Show: <strong>${duty.lnDS!==null ? fmt(duty.lnDS) : '--'}</strong></div>
    <div class="lsum">Duty off: <strong>${duty.lnDE!==null ? fmt(duty.lnDE) : '--'}</strong></div>
    <div class="lsum">Total duty: <strong class="${dc}">${hm(duty.lnDM)}${hasEst?' (incl est)':''}</strong></div>
    <div class="lsum">Block: <strong>${hm(duty.realB)}${hasEst?'<span style="color:#0c4479"> +est</span>':''}</strong></div>
    <div class="lsum">Legs: <strong>${myLegs.filter(l=>l[4]!=='EST').length}${hasEst?'+2 est':''}</strong></div>
  </div>
  <div style="padding:4px 14px 6px;background:#f4f4f2">
    <div style="height:8px;border-radius:4px;background:#e0e0e0;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:${dc==='over'?'#A32D2D':dc==='warn'?'#BA7517':'#4a9e6a'};border-radius:4px"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:#aaa;margin-top:2px"><span>0h</span><span>8h</span><span>12h</span><span style="color:#A32D2D;font-weight:700">14h limit</span></div>
  </div>` : '';

  const rows = allLegs.map(leg => {
    const [dm, am, orig, dest, ...rest] = leg;
    const isEst = rest[0] === 'EST';
    const pax   = !isEst && rest[0] ? rest[0] : 0;
    const dur   = am && am>dm ? hm(am-dm) : '';
    const isSrLeg = srHOm && dm < srHOm;
    let pTag, pClass;
    if (isEst)      { pTag = 'Seapilot est'; pClass = 'est'; }
    else if (!srHOm){ pTag = isSrClick ? srName : lineName; pClass = 'ln'; }
    else if (isSrLeg){ pTag = srName||'Senior'; pClass = 'sr'; }
    else            { pTag = lineName; pClass = 'ln'; }
    const rCls = isEst ? 'est' : isSrLeg ? 'sr' : '';
    return `<tr class="${rCls}"><td class="leg-dep">${fmt(dm)}</td><td class="leg-arr">${am?fmt(am):''}</td><td class="leg-dur">${dur}</td><td>${orig}</td><td class="ld-${dest}">${dest}</td><td style="text-align:right;font-size:10px;color:#888">${pax?pax+'p':''}</td><td><span class="ptag ${pClass}">${pTag}</span></td></tr>`;
  }).join('');

  const bg = isSrClick ? '#0a5c3a' : '#1a1a1a';
  const estNote = spLegs.length ? `<div class="est-note">Blue rows = estimated seapilot charter (JNU-ELF-JNU, ${d?.isMorning?'08:15 AM':'16:40 PM'}). Not confirmed by SEAPA.</div>` : '';

  return `<div class="legs-panel" id="lp_${tail.replace(/\W/g,'')}_${ds}" onclick="event.stopPropagation()">
    <div class="legs-hdr" style="background:${bg}"><span>${isSrClick?srName:lineName} - ${tail}</span><span class="lx" onclick="closeLegs(event)">x</span></div>
    ${summary}${restHtml}
    <table class="leg-table"><thead><tr><th>Dep</th><th>Arr</th><th>Dur</th><th>From</th><th>To</th><th>Pax</th><th>Pilot</th></tr></thead><tbody>${rows}</tbody></table>
    ${estNote}
  </div>`;
}

function showLegs(ds, tail, srName, lineName, isSr, srHO, e) {
  if (e) e.stopPropagation();
  const k = ds+'|'+tail+'|'+(isSr?'sr':'ln');
  if (activePilot === k) { activePilot=null; closeLegs(); return; }
  activePilot = k;
  closeLegs();
  if (e) e.currentTarget.classList.add('active');
  const panel = buildLegsPanel(ds, tail, srName, lineName, isSr, srHO);
  const card = document.getElementById('tc_'+ds+'_'+tail.replace(/\W/g,''));
  if (card) card.insertAdjacentHTML('afterend', panel);
}
function closeLegs(e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  activePilot = null;
  document.querySelectorAll('[id^="lp_"]').forEach(el => el.remove());
  document.querySelectorAll('.tc-pilot,.tc-sr-pilot').forEach(el => el.classList.remove('active'));
}

// -- DETAIL PANEL ------------------------------------------------------------
function showDetail(ds, scroll) {
  const d = ALL.find(x => x.ds===ds);
  if (!d) { document.getElementById('det').style.display='none'; return; }

  const slbl = d.sev==='HARD' ? 'Hard conflict' : d.sev==='WATCH' ? 'Duty watch' : 'Clean';
  const chips = [];
  if (d.isPybus) chips.push(d.pc?.level==='HARD' ? '<span class="fl fl-PH">Pybus - Perkins!</span>' : '<span class="fl fl-P">Pybus Bay 05:45</span>');
  if (d.isMorning)      chips.push(`<span class="fl fl-M">Seapilot AM (est) - ${TUE_AM[ds]}</span>`);
  else if (d.isSpDay) {
    if (d.elfinConf?.type==='HARD') chips.push('<span class="fl fl-ECH">Seapilot - HARD</span>');
    else if (d.elfinConf)           chips.push('<span class="fl fl-ECW">Seapilot - watch</span>');
    else                            chips.push('<span class="fl fl-E">Seapilot 16:40 (est)</span>');
  }
  if (d.hasRestViol) chips.push('<span class="fl" style="background:#fff8f8;color:#8b0000;border:1px solid #f5c0c0">Rest!</span>');
  if (d.hasDutyOver) chips.push('<span class="fl" style="background:#fee;color:#8b0000;border:1px solid #A32D2D">Duty!</span>');

  let alerts = '';
  // Schedule overlap violations
  if (d.dayOverlaps && d.dayOverlaps.length) {
    d.dayOverlaps.forEach(o => {
      alerts += `<div class="alert red"><strong>Block conflict on ${o.tail}:</strong> ` +
        `${fmt(o.l1_dep)}-${fmt(o.l1_arr)} ${o.l1_orig}&rarr;${o.l1_dest} overlaps ` +
        `${fmt(o.l2_dep)}-${fmt(o.l2_arr)} ${o.l2_orig}&rarr;${o.l2_dest} ` +
        `(${o.overlap_mins} min) &mdash; one leg needs to move to another tail.</div>`;
    });
  }
  // Destination qualification violations
  if (d.qualViols && d.qualViols.length) {
    const DEST_NAMES = {
      'ELF':'Elfin Cove (ELV)','PCK':'Pack Creek (PBK)',
      'ANS':'Angoon','TKE':'Tenakee Springs','PEL':'Pelican',
      'NRL':'Norris Lake','WFC':'Waterfall Creek','PYB':'Pybus',
      'HsL':'Hasselborg Lake','WTL':'West Turner Lake','YNG':'Young Lake',
    };
    d.qualViols.forEach(v => {
      alerts += `<div class="alert amber"><strong>Qual / aircraft restriction:</strong> ` +
        `${v.note} &mdash; ${v.pilot} on ${v.tail}, ` +
        `${fmt(v.dep)} ${v.orig}&rarr;${DEST_NAMES[v.dest]||v.dest}. ` +
        `Float-rated aircraft or qualified pilot needed.</div>`;
    });
  }
  // Rest/8in24 violations
  const restViols = (d.dayViols||[]).filter(v=>v.type==='REST' && !v._is_prev);
  const dutyViols = (d.dayViols||[]).filter(v=>v.type==='DUTY');
  const b24Viols  = (d.dayViols||[]).filter(v=>v.type==='8IN24');
  b24Viols.forEach(v => { alerts += `<div class="alert red"><strong>8-in-24 violation:</strong> ${v.detail}</div>`; });
  dutyViols.forEach(v => { alerts += `<div class="alert red"><strong>Duty limit exceeded:</strong> ${v.detail}</div>`; });
  const seenRest = new Set();
  restViols.forEach(v => {
    const key = v.tail + '|' + v.prev_ds;
    if (seenRest.has(key)) return;
    seenRest.add(key);
    alerts += `<div class="alert ${v.sev==='CRITICAL'?'red':'amber'}"><strong>Rest violation (${v.sev}):</strong> ${v.detail}</div>`;
  });
  // Perkins
  if (d.pc?.level==='HARD') alerts += `<div class="alert red"><strong>Perkins - no Pybus restriction:</strong> ${d.pc.msg}</div>`;
  else if (d.pc?.level==='OK') alerts += `<div class="alert green"><strong>Perkins - Pybus covered:</strong> ${d.pc.msg}</div>`;
  // Scheduling conflicts
  if (d.isHard) alerts += `<div class="alert red"><strong>Scheduling conflict:</strong> Both amphib caravans at Pybus 05:45-09:30 + seapilot morning charter needs amphib 08:15. Fix: Corson covers N264KP early legs, done 07:30, then flies seapilot charter 08:15-09:30.</div>`;
  if (d.isWatch && !d.isHard) alerts += `<div class="alert amber"><strong>Duty watch:</strong> Pybus 05:45 + seapilot 16:40 = ~13.25h duty. Senior early-leg split gets line pilot to 07:30 show, duty drops to ~11.5h.</div>`;
  if (d.elfinConf) {
    const t = d.elfinConf.type==='HARD' ? 'red' : 'amber';
    alerts += `<div class="alert ${t}"><strong>Seapilot charter conflict (estimated):</strong> ${d.elfinConf.detail}<br><em>Estimated - confirm with SEAPA.</em></div>`;
  } else if (d.isSpDay) {
    alerts += `<div class="alert blue">Estimated seapilot charter: ${d.isMorning?'08:15 JNU-ELF, 09:00 ELF-JNU':'16:40 JNU-ELF, 17:30 ELF-JNU'} on ${d.spTail||'amphib'} - ${d.spConf==='HIGH'?'confirmed seapilot ship':'probable seapilot ship'}. No duty conflict.</div>`;
  }

  const cards = d.assignments.map(a => {
    const safeT = a.t.replace(/\W/g,'');
    const cardId = 'tc_'+ds+'_'+safeT;
    const srHOm  = a.srHO ? pt(a.srHO) : null;
    const base   = LEGS[ds+'|'+a.t] || [];
    const spLegs = a.isSpTail ? (d.isMorning ? SP_AM_LEGS : SP_PM_LEGS) : [];
    const allLegs = [...base, ...spLegs].sort((x,y) => x[0]-y[0]);
    const duty   = allLegs.length ? calcDuty(allLegs, srHOm) : null;
    const dc     = duty ? dcol(duty.lnDM) : 'ok';
    const pct    = duty ? Math.min(100, Math.round(duty.lnDM/840*100)) : 0;
    const ts     = (TSUMM[a.t]||{})[ds] || null;

    // Seapilot badge
    let spBadge = '';
    if (a.isSpTail) {
      const sc = d.elfinConf?.type==='HARD' ? 'sp-h' : d.elfinConf ? 'sp-w' : 'sp-c';
      const sm = d.elfinConf?.type==='HARD' ? 'Seapilot - CONFLICT' : d.elfinConf ? 'Seapilot - watch duty' : `Seapilot ${d.isMorning?'08:15 AM':'16:40 PM'} (est)`;
      spBadge = `<div class="sp-badge ${sc}">${sm}</div>`;
    }
    const isPerkAM = a.pilot==='Perkins' && a.ty==='AM' && d.isPybus;

    const srCard = a.sr ? `<div class="tc-sr">
      <div style="margin-bottom:3px">
        <span class="tc-sr-pilot" onclick="showLegs('${ds}','${a.t}','${a.sr}','${a.pilot}',true,'${a.srHO||''}',event)">${fullName(a.sr)}</span>
        <span style="font-size:10px;color:#0a5c3a"> covers ${a.srCovers}</span>
      </div>
      ${duty && srHOm && duty.srDM ? `<div style="font-size:10px;color:#0a5c3a">Show ${fmt(duty.srDS)} - block ${hm(duty.srB)} - done ${fmt(srHOm)}</div>` : ''}
      <div style="font-size:10px;color:#888;margin-top:2px">Line pilot takes over: ${a.lineStart||'after handoff'}</div>
    </div>` : '';

    // Rest warnings for this tail
    let restWarn = '';
    if (ts && ts.rp !== undefined && ts.rp < 600) {
      const rc = ts.rp < 540 ? '#A32D2D' : '#e8a030';
      restWarn += `<div style="font-size:10px;margin-top:4px;padding:3px 6px;border-radius:3px;background:${ts.rp<540?'#fee':'#fffbf5'};border:1px solid ${rc};color:${rc}">Rest from prev (${ts.pd}): ${hm(ts.rp)}</div>`;
    }
    if (ts && ts.rn !== undefined && ts.rn < 600) {
      const rc = ts.rn < 540 ? '#A32D2D' : '#e8a030';
      restWarn += `<div style="font-size:10px;margin-top:4px;padding:3px 6px;border-radius:3px;background:${ts.rn<540?'#fee':'#fffbf5'};border:1px solid ${rc};color:${rc}">Rest to next (${ts.nds}) show ${ts.nds_start!==undefined?fmt(ts.nds_start):'--'}: ${hm(ts.rn)}</div>`;
    }

    const dutyBar = duty ? `<div class="duty-bar">
      <div class="duty-row"><span class="duty-label">Show</span><span class="duty-val ${dc}">${duty.lnDS!==null?fmt(duty.lnDS):'--'}</span></div>
      <div class="duty-row"><span class="duty-label">Block</span><span class="duty-val">${hm(duty.lnB)}${spLegs.length?'<span style="color:#0c4479;font-size:9px"> +est</span>':''}</span></div>
      <div class="duty-row"><span class="duty-label">Duty off</span><span class="duty-val ${dc}">${duty.lnDE!==null?fmt(duty.lnDE):'--'}</span></div>
      <div class="duty-row"><span class="duty-label">Duty</span><span class="duty-val ${dc}">${hm(duty.lnDM)}${spLegs.length?'<span style="color:#0c4479;font-size:9px"> w/est</span>':''}</span></div>
      <div style="height:5px;border-radius:3px;background:#eee;margin-top:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${dc==='over'?'#A32D2D':dc==='warn'?'#BA7517':'#4a9e6a'};border-radius:3px"></div></div>
    </div>${restWarn}` : '';

    const spClass = a.isSpTail ? (d.elfinConf?.type==='HARD'?'sp-hard':d.elfinConf?'sp-watch':'sp-clean') : '';
    const pilotClick = a.pilot==='???' ? '' : `onclick="showLegs('${ds}','${a.t}','${a.sr||''}','${a.pilot}',false,'${a.srHO||''}',event)"`;

    return `<div class="tail-card ${a.ty} ${spClass}" id="${cardId}">
      <div class="tc-tail">${a.t}</div>
      <div class="tc-type">${TL[a.ty]||a.ty}</div>
      ${srCard}
      <span class="tc-pilot${a.pilot==='???'?' no-pilot':''}" ${pilotClick}>${a.pilot==='???'?'NO PILOT':fullName(a.pilot)}</span>
      ${isPerkAM?'<div class="no-pybus-note">No Pybus flights - takes over after 09:30</div>':''}
      ${pilotScheduleSummary(a.pilot)}
      ${spBadge}${dutyBar}
    </div>`;
  }).join('');

  const ops = [];
  if (d.isPybus) ops.push(`<div style="display:flex;gap:6px"><span class="ops-label">Pybus</span><span>05:45 dep - 5 aircraft - 14 legs - back 09:30</span></div>`);
  if (d.isMorning && d.isSpDay) ops.push(`<div style="display:flex;gap:6px"><span class="ops-label">Seapilot</span><span>08:15 JNU-ELF - 09:00 ELF-JNU - ${TUE_AM[ds]} 08:30 arr GB - amphib req</span></div>`);
  else if (d.isSpDay) ops.push(`<div style="display:flex;gap:6px"><span class="ops-label">Seapilot</span><span>16:40 JNU-ELF - 17:30 ELF-JNU - ${d.spTail} - ${d.spConf==='HIGH'?'confirmed ship':'probable ship'}</span></div>`);


  // Suggestions panel
  let suggHtml = '';
  if (d.daySugg && d.daySugg.length) {
    const SUGG_LABELS = {
      'LEG_SWAP':   {icon:'swap',  color:'#0c6e9a', bg:'#eef6fb'},
      'IDLE_TAIL':  {icon:'idle',  color:'#888',    bg:'#f5f5f5'},
      'LIGHT_TAIL': {icon:'light', color:'#6b5c00', bg:'#fffde6'},
      'TIGHT_TURN': {icon:'tight', color:'#c0392b', bg:'#fff5f5'},
      'SENIOR_HEAVY':{icon:'sr',   color:'#8B4513', bg:'#fdf5ee'},
      'FLOAT_WINDOW':{icon:'gap',  color:'#2e7d52', bg:'#f0faf4'},
    };
    const rows = d.daySugg.map(s => {
      const lbl = SUGG_LABELS[s.type] || {icon:'?', color:'#555', bg:'#f5f5f5'};
      return `<div style="display:flex;gap:10px;padding:6px 10px;background:${lbl.bg};border-radius:5px;margin-bottom:4px;align-items:flex-start">
        <span style="font-size:9px;font-weight:700;color:${lbl.color};background:${lbl.bg};border:1px solid ${lbl.color};border-radius:3px;padding:1px 5px;white-space:nowrap;margin-top:1px">${s.type.replace('_',' ')}</span>
        <span style="font-size:11px;color:#333;line-height:1.6">${s.msg}</span>
      </div>`;
    }).join('');
    suggHtml = `<div style="margin-top:12px;border:1px solid #dde8ee;border-radius:7px;overflow:hidden">
      <div style="background:#0c6e9a;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;letter-spacing:.04em">
        DISPATCH SUGGESTIONS
        <span style="font-size:10px;font-weight:400;opacity:.8;margin-left:8px">-- these are nudges, not assignments. All leg moves happen in Takeflite.</span>
      </div>
      <div style="padding:8px">${rows}</div>
    </div>`;
  }
  document.getElementById('det').innerHTML = `<div class="detail">
    <div class="det-hdr">
      <span class="det-date">${ds}</span>
      <span class="det-dow">${d.dow}</span>
      <span class="sev-chip sev-${d.sev}">${slbl}</span>
      <div class="det-flags">${chips.join('')}</div>
      <button class="btn" onclick="closeDet()" style="margin-left:auto">x close</button>
    </div>
    ${suggHtml}
    ${alerts}
    <div style="font-size:10px;color:#888;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em">Click any pilot name for flights + block + duty</div>
    <div class="tail-grid">${cards}</div>
    ${ops.length ? `<div class="ops-strip">${ops.join('')}</div>` : ''}
  </div>`;
  document.getElementById('det').style.display = 'block';
  if (scroll !== false) document.getElementById('det').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDet() {
  selDate = null; activePilot = null;
  document.querySelectorAll('[id^="lp_"]').forEach(el => el.remove());
  document.getElementById('det').style.display = 'none';
  document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
}

const DOW_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function pilotScheduleSummary(pilot) {
  const wd = WORK_DAYS[pilot];
  if (!wd) return '';
  const onDays  = DOW_NAMES.filter((_,i) => wd.has(i));
  const offDays = DOW_NAMES.filter((_,i) => !wd.has(i));
  return `<div style="font-size:10px;color:#888;margin-top:5px;padding-top:5px;border-top:1px solid #f0f0f0">
    <span style="color:#2e7d52;font-weight:700">ON:</span> ${onDays.join(' ')}
    &nbsp;&nbsp;
    <span style="color:#A32D2D;font-weight:700">OFF:</span> ${offDays.join(' ')}
  </div>`;
}

function fullName(p) { return FULL_NAMES[p] || p; }

// -- RENDER CALENDAR ---------------------------------------------------------
function renderCal() {
  const fset = new Set(getFiltered().map(d => d.ds));
  const MN   = ['May','Jun','Jul','Aug','Sep'];
  let h = '<div class="cal-wrap"><div style="min-width:700px">';

  for (let mi = 0; mi < 5; mi++) {
    const mn = mi+4, yr = 2026;
    h += `<div class="month-block"><div class="month-hdr">${MN[mi]} 2026</div>`;
    h += `<div class="dow-row">${['Su','Mo','Tu','We','Th','Fr','Sa'].map(x=>`<div class="dow-cell">${x}</div>`).join('')}</div>`;
    const fd  = new Date(yr,mn,1).getDay();
    const dim = new Date(yr,mn+1,0).getDate();
    const cells = [];
    for (let i=0; i<fd; i++) cells.push('<div class="day-cell empty"></div>');

    for (let day=1; day<=dim; day++) {
      const ds = yr+'-'+String(mn+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      const d  = ALL.find(x => x.ds===ds);
      if (!d) { cells.push('<div class="day-cell empty"></div>'); continue; }

      const vis = activeFilter==='ALL' || fset.has(ds);
      if (!vis) { cells.push(`<div class="day-cell" style="opacity:.12"><div class="dn">${day}</div></div>`); continue; }

      // Flags
      const flags = [];
      if (d.isPybus) flags.push(d.pc?.level==='HARD' ? '<span class="fl fl-PH" data-tip="Pybus day -- Perkins conflict: cannot fly Pybus legs">P!</span>' : '<span class="fl fl-P" data-tip="Pybus Bay lodge day (05:45 departure)">P</span>');
      if (d.isMorning && d.isSpDay) flags.push('<span class="fl fl-M" data-tip="Elfin Cove seapilot -- morning charter (Nieuw Amsterdam or Westerdam arrives Glacier Bay 08:30, amphib required 08:15)">SM</span>');
      else if (d.isSpDay) flags.push(d.elfinConf?.type==='HARD' ? '<span class="fl fl-ECH" data-tip="Elfin Cove seapilot -- HARD conflict with amphib tail duty limits">SH</span>' : d.elfinConf ? '<span class="fl fl-ECW" data-tip="Elfin Cove seapilot -- watch: adding charter legs pushes one amphib tail near duty limit">SW</span>' : '<span class="fl fl-E" data-tip="Elfin Cove seapilot day (estimated -- 16:40 JNU-ELF, 17:30 ELF-JNU)">S</span>');
      if (d.hasOverlap)  flags.push('<span class="fl" style="background:#fee;color:#A32D2D;border:1px solid #A32D2D;font-weight:800" data-tip="Block conflict: two legs on the same tail overlap in time -- one must move to another aircraft">!!</span>');
      if (d.hasQualViol) flags.push('<span class="fl" style="background:#fff8f2;color:#8B4513;border:1px solid #d4956a" data-tip="Qualification violation: a pilot is assigned to a tail with an ELV or PBK leg they are not cleared for">Q</span>');
      if (d.hasRestViol) flags.push('<span class="fl" style="background:#fff8f8;color:#8b0000;border:1px solid #f5c0c0" data-tip="Rest violation: a tail has less than 10 hours rest between consecutive operating days">R</span>');
      if (d.hasDutyOver) flags.push('<span class="fl" style="background:#fee;color:#A32D2D;border:1px solid #A32D2D" data-tip="Duty over 14h: a tail exceeds the maximum 14-hour duty limit on this day">D</span>');
      if (d.hasSuggHigh) {
        const suggTypes = [...new Set((d.daySugg||[]).filter(s=>s.priority<=2).map(s=>s.type.replace('_',' ')))].join(', ');
        flags.push(`<span class="fl" style="background:#eef6fb;color:#0c6e9a;border:1px solid #b0d4e8" data-tip="Dispatch suggestions: ${suggTypes}">?</span>`);
      }

      // All pilots as color-coded initials, 2 rows of 6
      const allIni = d.assignments.map(a => {
        const col = a.pilot==='???' ? '#A32D2D' : (TC[a.ty]||'#555');
        return `<span style="color:${col};font-size:11px;font-weight:700">${ini(a.pilot)}</span>`;
      });
      const r1 = allIni.slice(0,6).join(' ');
      const r2 = allIni.slice(6).join(' ');

      const sel = selDate===ds ? ' selected' : '';
      // Build tooltip data string: pipe-separated tail|pilot|type|sr entries
      const tipData = d.assignments.map(a=>`${a.t}|${a.pilot}|${a.ty}|${a.sr||''}`).join('~');
      cells.push(`<div class="day-cell ${d.sev}${sel}" onclick="selDay('${ds}')"
        onmouseenter="showTip(event,'${tipData}','${ds}')" onmouseleave="hideTip()">
        <div class="dn">${day}</div>
        ${flags.length ? `<div class="flags" onmouseenter="hideTip()">${flags.join('')}</div>` : ''}
        <div style="line-height:1.6;margin-top:2px;font-family:'Courier New',monospace">${r1}</div>
        <div style="line-height:1.6;font-family:'Courier New',monospace">${r2}</div>
      </div>`);
    }

    while (cells.length % 7) cells.push('<div class="day-cell empty"></div>');
    for (let r=0; r<cells.length/7; r++) h += `<div class="week-row">${cells.slice(r*7,r*7+7).join('')}</div>`;
    h += '</div>';
  }
  h += '</div></div>';
  document.getElementById('cal').innerHTML = h;
}

// -- RENDER LIST -------------------------------------------------------------
function renderList() {
  const days = getFiltered();
  let h = `<div class="list-hdr"><span>Date</span><span>Day</span><span>Status</span><span>Amphib pilots</span><span>Flags</span></div><div>`;
  for (const d of days) {
    const chips = [];
    if (d.isPybus) chips.push(d.pc?.level==='HARD' ? '<span class="fl fl-PH">Pybus!</span>' : '<span class="fl fl-P">Pybus</span>');
    if (d.isMorning && d.isSpDay) chips.push('<span class="fl fl-M">SP AM</span>');
    else if (d.isSpDay) chips.push(d.elfinConf ? '<span class="fl fl-ECW">SP watch</span>' : '<span class="fl fl-E">SP</span>');
    if (d.hasRestViol) chips.push('<span class="fl" style="background:#fff8f8;color:#8b0000;border:1px solid #f5c0c0">Rest</span>');
    if (d.hasDutyOver) chips.push('<span class="fl" style="background:#fee;color:#A32D2D;border:1px solid #A32D2D">Duty</span>');
    if (d.hasSuggHigh) chips.push('<span class="fl" style="background:#eef6fb;color:#0c6e9a;border:1px solid #b0d4e8">Suggestions</span>');
    const sc = d.sev==='HARD' ? '#A32D2D' : d.sev==='WATCH' ? '#854F0B' : '#888';
    const amP = d.assignments.filter(a=>a.ty==='AM').map(a=>`${a.t}:${a.pilot}`).join(' ');
    h += `<div class="list-row" onclick="selDay('${d.ds}')">
      <span style="font-weight:700">${d.ds}</span>
      <span style="color:#888">${d.dow}</span>
      <span style="color:${sc};font-weight:700">${d.sev}</span>
      <span style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:#444">${amP}</span>
      <div style="display:flex;gap:3px;flex-wrap:wrap">${chips.join('')}</div>
    </div>`;
  }
  h += '</div>';
  document.getElementById('lst').innerHTML = h;
}

// -- SELECTION ---------------------------------------------------------------
function selDay(ds) {
  selDate = ds;
  activePilot = null;
  hideTip();
  document.querySelectorAll('[id^="lp_"]').forEach(el => el.remove());
  renderCal();
  showDetail(ds);
}

function renderAll() {
  const calEl = document.getElementById('cal');
  const lstEl = document.getElementById('lst');
  if (activeView === 'CAL') { calEl.style.display=''; lstEl.style.display='none'; renderCal(); }
  else                       { calEl.style.display='none'; lstEl.style.display=''; renderList(); }
  if (selDate) showDetail(selDate, false);
}

function showTip(e, data, ds) {
  if (selDate === ds) return;
  if (e.target.closest('.fl[data-tip]')) return; // badge has its own tooltip
  const tip = document.getElementById('gtip');
  const entries = data.split('~');
  const rows = entries.map(entry => {
    const [tail, pilot, ty, sr] = entry.split('|');
    const col = pilot==='???' ? '#e87070' : (TC[ty]||'#555');
    const srTag = sr ? ` <span style="color:#5ba87a;font-size:10px"> sr:${sr}</span>` : '';
    return `<div class="gtr"><span class="gtr-tail">${tail}</span><span class="gtr-pilot" style="color:${col}">${pilot==='???'?'NO PILOT':pilot}</span>${srTag}</div>`;
  }).join('');
  tip.innerHTML = `<div style="color:#9a9490;font-size:11px;margin-bottom:6px;letter-spacing:.06em;border-bottom:1px solid #eee;padding-bottom:4px">${ds} &middot; hover for all pilots</div>${rows}`;
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const tip = document.getElementById('gtip');
  if (tip.style.display==='none') return;
  if (e.target.closest('.fl[data-tip]')) { tip.style.display='none'; return; }
  const W = window.innerWidth, H = window.innerHeight;
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + tw > W - 8) x = e.clientX - tw - 8;
  if (y + th > H - 8) y = e.clientY - th - 8;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}
function hideTip() {
  document.getElementById('gtip').style.display = 'none';
}
document.addEventListener('mousemove', moveTip);

// Close legs panel when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('[id^="lp_"]') && 
      !e.target.closest('.tc-pilot') && 
      !e.target.closest('.tc-sr-pilot')) {
    if (document.querySelector('[id^="lp_"]')) closeLegs();
  }
});

// Badge tooltips reuse #gtip with edge-aware positioning
// Badge tooltip - uses dedicated #btip div, independent of pilot popup
document.addEventListener('mouseover', function(e) {
  const badge = e.target.closest('.fl[data-tip]');
  if (!badge) return;
  const tip = document.getElementById('btip');
  tip.textContent = badge.getAttribute('data-tip');
  tip.style.display = 'block';
  const rect = badge.getBoundingClientRect();
  const W = window.innerWidth;
  const tw = Math.min(240, W - 16);
  tip.style.maxWidth = tw + 'px';
  // Measure after setting content
  const th = tip.offsetHeight || 50;
  let x = rect.left + rect.width/2 - tw/2;
  let y = rect.top - th - 8;
  if (x < 8) x = 8;
  if (x + tw > W - 8) x = W - tw - 8;
  if (y < 8) y = rect.bottom + 8;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
});
document.addEventListener('mouseout', function(e) {
  const badge = e.target.closest('.fl[data-tip]');
  if (!badge) return;
  if (!badge.contains(e.relatedTarget)) {
    document.getElementById('btip').style.display = 'none';
  }
});
renderAll();
updateFilterCounts();
